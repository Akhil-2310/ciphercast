name: Auto-Settle Markets

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  settle:
    runs-on: ubuntu-latest
    environment: market
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: cd packages/hardhat && yarn install --frozen-lockfile

      - name: Run auto-settlement
        run: cd packages/hardhat && npx hardhat run scripts/auto-settle.ts --network sepolia
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
